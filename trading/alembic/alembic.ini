[alembic]
script_location = alembic
# Database URL is read from DATABASE_URL env var at runtime.
# Fallback to SQLite for local development only.
# Do NOT hardcode production credentials here.
sqlalchemy.url = sqlite+aiosqlite:///./trading.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
