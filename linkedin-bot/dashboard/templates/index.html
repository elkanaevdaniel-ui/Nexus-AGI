<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LinkedIn Bot Dashboard</title>
<style>
  :root {
    --bg-primary: #0F0F1A;
    --bg-secondary: #1A1D2E;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-primary: #FFFFFF;
    --text-muted: #CBD5E1;
    --text-subtle: #9CA3AF;
    --accent: #4F46E5;
    --accent-light: #A78BFA;
    --success: #10B981;
    --success-light: #6EE7B7;
    --danger: #EF4444;
    --danger-light: #FCA5A5;
    --warning: #F59E0B;
    --warning-light: #FCD34D;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 999px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  .container {
    max-width: 1440px;
    margin: 0 auto;
  }

  /* Skip to content link for screen readers */
  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: var(--accent);
    color: var(--text-primary);
    padding: 8px 16px;
    border-radius: 0 0 var(--radius-sm) 0;
    z-index: 100;
  }
  .skip-link:focus {
    top: 0;
  }

  /* Navbar with glass effect */
  .navbar {
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    min-height: 64px;
  }
  .navbar h1 {
    font-size: 1.2rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bot-badge {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .bot-badge.running {
    background: var(--success);
    color: var(--success-light);
  }
  .bot-badge.stopped {
    background: var(--danger);
    color: var(--danger-light);
  }

  /* Tab navigation */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    overflow-x: auto;
    padding: 0 16px;
    position: sticky;
    top: 64px;
    z-index: 99;
  }
  .tab {
    padding: 12px 20px;
    cursor: pointer;
    font-size: 0.88rem;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    color: var(--text-muted);
    transition: all 0.2s ease;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  }
  .tab:hover {
    color: var(--text-primary);
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* Main content area */
  .content {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
    padding-top: 20px;
  }

  /* Glass cards */
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 24px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .glass-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2);
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    padding: 20px;
    text-align: center;
    transition: all 0.3s ease;
  }
  .stat-card:hover {
    background: rgba(79, 70, 229, 0.1);
  }
  .stat-value {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 1rem;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* Tunnel info */
  .tunnel-info {
    background: rgba(79, 70, 229, 0.1);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-top: 24px;
    text-align: center;
  }
  .tunnel-url {
    font-family: monospace;
    color: var(--accent);
    font-size: 0.9rem;
    word-break: break-all;
  }

  /* Responsive breakpoints */
  @media (max-width: 640px) {
    .navbar {
      padding: 12px 16px;
      min-height: 56px;
    }
    .navbar h1 {
      font-size: 1rem;
    }
    .tabs {
      padding: 0 12px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 0.8rem;
    }
    .content {
      padding: 16px;
    }
    .stats-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Accessibility improvements */
  button {
    font-size: 1rem;
    padding: 12px 24px;
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    min-height: 44px;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover,
  .btn-primary:focus {
    background: #6D28D9;
    outline: 2px solid rgba(124, 58, 237, 0.5);
    outline-offset: 2px;
  }
  .btn-success {
    background: var(--success);
    color: var(--success-light);
  }
  .btn-success:hover,
  .btn-success:focus {
    background: #059669;
    outline: 2px solid rgba(16, 185, 129, 0.5);
    outline-offset: 2px;
  }
  .btn-danger {
    background: var(--danger);
    color: var(--danger-light);
  }
  .btn-danger:hover,
  .btn-danger:focus {
    background: #DC2626;
    outline: 2px solid rgba(239, 68, 68, 0.5);
    outline-offset: 2px;
  }
  .btn-secondary {
    background: var(--glass-bg);
    color: var(--text-primary);
    border: 1px solid var(--glass-border);
  }
  .btn-secondary:hover,
  .btn-secondary:focus {
    background: rgba(255, 255, 255, 0.1);
    outline: 2px solid rgba(255, 255, 255, 0.3);
    outline-offset: 2px;
  }

  /* Focus indicators */
  *:focus {
    outline: 2px solid rgba(124, 58, 237, 0.5);
    outline-offset: 2px;
  }

  /* High contrast mode support */
  @media (prefers-contrast: high) {
    .glass-card {
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid white;
    }
    .stat-value {
      color: white;
    }
  }

  /* Reduced motion support */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Tunnel configuration */
  .tunnel-config {
    background: rgba(124, 58, 237, 0.1);
    border: 1px solid rgba(124, 58, 237, 0.3);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-top: 24px;
    text-align: center;
  }
  .tunnel-url {
    font-family: monospace;
    color: var(--accent);
    font-size: 0.9rem;
    word-break: break-all;
  }

  /* Responsive layout */
  @media (max-width: 640px) {
    .navbar {
      padding: 12px 16px;
      min-height: 56px;
    }
    .navbar h1 {
      font-size: 1rem;
    }
    .tabs {
      padding: 0 12px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 0.8rem;
    }
    .content {
      padding: 16px;
    }
    .stats-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Accessibility audit */
  .accessibility-report {
    background: rgba(124, 58, 237, 0.1);
    border: 1px solid rgba(124, 58, 237, 0.3);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 24px;
  }
  .accessibility-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .accessibility-icon {
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
  }
  .accessibility-status {
    font-weight: 600;
  }
  .accessibility-pass {
    color: var(--success);
  }
  .accessibility-fail {
    color: var(--danger);
  }
}
</style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div class="container">
    <header class="dashboard-header">
      <h1 class="dashboard-title">LinkedIn Bot</h1>
      <div class="status-row">
        <div><div class="info-label">Status</div><div class="info-val" id="dbStatus">-</div></div>
        <div><div class="info-label">Next Post</div><div class="info-val" id="dbNext">-</div></div>
      </div>
    </header>
    
    <main id="main-content" role="main">
      <div class="glass-card">
        <h2>Bot Control</h2>
        <div class="status-row" style="margin-bottom:14px">
          <div><div class="info-label">Status</div><div class="info-val" id="dbStatus">-</div></div>
          <div><div class="info-label">Next Post</div><div class="info-val" id="dbNext">-</div></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-success" onclick="botAction('start')" aria-label="Start bot">&#9654; Start</button>
          <button class="btn btn-danger" onclick="botAction('stop')" aria-label="Stop bot">&#9646;&#9646; Stop</button>
          <button class="btn btn-secondary" onclick="botAction('restart')" aria-label="Restart bot">&#128260; Restart</button>
          <button class="btn btn-primary" onclick="triggerGenerate()" aria-label="Generate new post">&#10024; Generate</button>
        </div>
      </div>
      
      <div class="tunnel-info">
        <h2>External Access</h2>
        <p>Dashboard URL:</p>
        <div class="tunnel-url" id="dbTunnel">Loading...</div>
      </div>
    </main>
  </div>
  
  <script>
    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', () => {
      fetchDashboard();
    });
    
    // Fetch dashboard data
    async function fetchDashboard() {
      try {
        const response = await fetch('/api/dashboard');
        if (response.ok) {
          const data = await response.json();
          
          // Update stats
          document.getElementById('statTotal').textContent = data.total || '-';
          document.getElementById('statApproved').textContent = data.approved || '-';
          document.getElementById('statToday').textContent = data.today || '-';
          document.getElementById('statWeek').textContent = data.this_week || '-';
          
          // Update status
          document.getElementById('dbStatus').textContent = data.status || '-';
          document.getElementById('dbNext').textContent = data.next_post || '-';
          
          // Update tunnel URL
          document.getElementById('dbTunnel').textContent = data.tunnel_url || 'Not available';
        }
      } catch (error) {
        console.error('Error fetching dashboard:', error);
        document.getElementById('stats').innerHTML = '<p style="color:var(--text-muted)">Error loading data</p>';
      }
    }
    
    // Start dashboard
    fetchDashboard();
  </script>
</body>
</html>
